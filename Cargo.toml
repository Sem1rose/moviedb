[package]
name = "moviedb"
version = "0.1.0"
edition = "2021"

[dependencies]
clap = { version = "4.5.17", features = ["derive"] }
cocoon = { version = "0.4.3", features = ["thiserror"] }
color-eyre = "0.6.3"
crossterm = "0.28.1"
dirs = "5.0.1"
env_logger = "0.11.7"
image = "0.25.5"
json = "0.12.4"
log = "0.4.26"
rand = "0.8.5"
ratatui = "0.28.1"
ratatui-image = { version = "5.0.0", features = ["crossterm"] }
ratatui-macros = "0.6.0"
reqwest = { version = "0.12.7", features = ["blocking", "json"] }
serde = { version = "1.0.210", features = ["derive"] }
serde_json = "1.0.128"
thiserror = "2.0.12"
throbber-widgets-tui = "0.7.0"
tui-input = "0.10.1"
unix-ts = "1.0.0"
