[package]
name = "moviedb"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1.0.100"
clap = { version = "4.5.17", features = ["derive"] }
cocoon = { version = "0.4.3", features = ["thiserror"] }
crossterm = "0.28.1"
dirs = "6.0.0"
env_logger = "0.11.7"
image = "0.25.5"
itertools = "0.14.0"
json = "0.12.4"
log = "0.4.26"
nucleo-matcher = "0.3.1"
rand = "0.9.0"
ratatui = "0.29.0"
ratatui-image = { version = "5.0.0", features = ["crossterm"] }
ratatui-macros = "0.6.0"
reqwest = { version = "0.12.7", features = ["blocking", "json"] }
serde = { version = "1.0.210", features = ["derive"] }
serde_json = "1.0.128"
thiserror = "2.0.12"
throbber-widgets-tui = "0.8.0"
tui-input = "0.11.1"
unix-ts = "1.0.0"
